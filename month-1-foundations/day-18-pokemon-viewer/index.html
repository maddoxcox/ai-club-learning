<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f0f0f0; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; }
        .search { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .search input { padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; width: 300px; }
        .search button { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .pokemon-card { max-width: 400px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .pokemon-card img { width: 200px; height: 200px; }
        .pokemon-name { font-size: 28px; font-weight: bold; text-transform: capitalize; }
        .pokemon-id { color: #999; }
        .types { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
        .type-badge { padding: 4px 12px; border-radius: 12px; color: white; font-size: 14px; text-transform: capitalize; }
        .stats { text-align: left; margin-top: 15px; }
        .stat-row { display: flex; align-items: center; margin: 5px 0; }
        .stat-name { width: 80px; font-size: 13px; color: #666; }
        .stat-bar { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .stat-value { width: 35px; text-align: right; font-size: 13px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .nav button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white; }
        .error { text-align: center; color: #e74c3c; padding: 20px; }
        .loading { text-align: center; color: #999; padding: 20px; }
    </style>
</head>
<body>
    <h1>Pokemon Viewer</h1>
    <div class="search">
        <input type="text" id="search-input" placeholder="Enter Pokemon name or ID...">
        <button id="search-btn">Search</button>
    </div>
    <div id="display"></div>
    <script src="app.js"></script>
</body>
</html>
