<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        h1 { color: #569cd6; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        select, input, button { padding: 10px; font-size: 14px; font-family: monospace; border: 1px solid #444; border-radius: 4px; background: #2d2d2d; color: #d4d4d4; }
        input { flex: 1; }
        button { background: #569cd6; color: white; cursor: pointer; border: none; }
        .samples { margin-bottom: 20px; }
        .sample-btn { padding: 5px 10px; margin: 3px; font-size: 12px; background: #333; cursor: pointer; }
        .response { background: #2d2d2d; border-radius: 8px; padding: 20px; }
        .status { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .status.ok { color: #4ec9b0; }
        .status.error { color: #f44747; }
        pre { white-space: pre-wrap; word-wrap: break-word; max-height: 500px; overflow-y: auto; }
        .history { position: fixed; right: 20px; top: 20px; width: 250px; background: #2d2d2d; border-radius: 8px; padding: 15px; max-height: 80vh; overflow-y: auto; }
        .history h3 { margin-bottom: 10px; color: #569cd6; }
        .history-item { padding: 5px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #444; word-break: break-all; }
        .history-item:hover { background: #333; }
    </style>
</head>
<body>
    <h1>API Explorer</h1>
    <div class="controls">
        <select id="method">
            <option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option>
        </select>
        <input type="text" id="url-input" placeholder="Enter API URL..." value="https://pokeapi.co/api/v2/pokemon/pikachu">
        <button id="send-btn">Send</button>
    </div>
    <div class="samples">
        <button class="sample-btn" data-url="https://pokeapi.co/api/v2/pokemon/pikachu">Pokemon</button>
        <button class="sample-btn" data-url="https://api.github.com/users/octocat">GitHub User</button>
        <button class="sample-btn" data-url="https://dog.ceo/api/breeds/image/random">Random Dog</button>
        <button class="sample-btn" data-url="https://jsonplaceholder.typicode.com/posts/1">JSON Placeholder</button>
    </div>
    <div class="response">
        <div id="status" class="status"></div>
        <div id="time"></div>
        <pre id="body">Click "Send" to make a request...</pre>
    </div>
    <div class="history">
        <h3>History</h3>
        <div id="history-list"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
